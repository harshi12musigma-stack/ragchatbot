version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragchatbot-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_data
      - MAX_UPLOAD_SIZE_MB=10
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - TOP_K_RESULTS=5
    volumes:
      - ./backend/chroma_data:/app/chroma_data
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ragchatbot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragchatbot-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ragchatbot-network

networks:
  ragchatbot-network:
    driver: bridge

volumes:
  chroma_data:
  uploads:
